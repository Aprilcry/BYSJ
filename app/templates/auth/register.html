<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智慧厨艺辅助系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .content {
            flex: 1;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 100%), 
                        url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=delicious%20food%20background%20minimalist%20style%20warm%20colors&image_size=landscape_16_9');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: relative;
            padding: 40px 0;
        }

        .navbar {
            background-color: #343a40;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 注册卡片 */
        .register-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 35px;
            width: 90%;
            max-width: 450px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(200, 200, 200, 0.3);
            position: relative;
            z-index: 10;
            animation: cardAppear 0.6s ease-out;
            margin: 0 auto;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 标题样式 */
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #333;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .register-header .subtitle {
            color: #666;
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 500;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            color: #333;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-input:focus {
            border-color: #ff9a9e;
            background: white;
            box-shadow: 0 0 20px rgba(255, 154, 158, 0.2);
            transform: translateY(-2px);
        }

        .form-input.is-invalid {
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
        }

        /* 输入框组 */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group .form-input {
            flex: 1;
        }

        /* 发送验证码按钮 */
        .btn-send-code {
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 12px;
            background: white;
            color: #667eea;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 110px;
            position: relative;
            overflow: hidden;
        }

        .btn-send-code:hover:not(:disabled) {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .btn-send-code:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 错误提示 */
        .error-message {
            color: #d32f2f;
            font-size: 0.8rem;
            margin-top: 5px;
            padding-left: 5px;
            display: none;
            font-weight: 500;
        }

        .error-message::before {
            content: '✦ ';
        }

        .success-message {
            color: #388e3c;
            font-size: 0.8rem;
            margin-top: 5px;
            padding-left: 5px;
            display: none;
            font-weight: 500;
        }

        .success-message::before {
            content: '✨ ';
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.6);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
            transform: translateY(-2px);
        }

        /* 装饰性元素 */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }

        .deco-circle-1 {
            width: 200px;
            height: 200px;
            top: 10%;
            right: 10%;
            animation: pulse 4s ease-in-out infinite;
        }

        .deco-circle-2 {
            width: 150px;
            height: 150px;
            bottom: 10%;
            left: 10%;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .register-header h1 {
                font-size: 1.6rem;
            }

            .input-group {
                flex-direction: column;
            }

            .btn-send-code {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{{ url_for('index') }}">智慧厨艺辅助系统</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('index') }}">首页</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('recipe.index') }}">食谱</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('ingredient.index') }}">食材</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('recommendation.index') }}">推荐</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('plaza.index') }}">广场</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.login') }}">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.register') }}">注册</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 装饰圆圈 -->
            <div class="deco-circle deco-circle-1"></div>
            <div class="deco-circle deco-circle-2"></div>

            <div class="container">
                <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
                    <!-- 注册卡片 -->
                    <div class="register-card">
                        <div class="register-header">
                            <h1>加入我们</h1>
                            <p class="subtitle">开启你的美食之旅</p>
                        </div>

                        <form method="POST" id="register-form">
                            <div class="form-group">
                                <label for="username">用户名</label>
                                <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名" required>
                                <div class="error-message" id="username-error"></div>
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱</label>
                                <div class="input-group">
                                    <input type="email" class="form-input" id="email" name="email" placeholder="请输入邮箱" required>
                                    <button type="button" class="btn-send-code" id="send-code">发送验证码</button>
                                </div>
                                <div class="error-message" id="email-error"></div>
                            </div>
                            <div class="form-group">
                                <label for="code">验证码</label>
                                <input type="text" class="form-input" id="code" name="code" placeholder="请输入验证码" required>
                                <div class="success-message" id="code-success"></div>
                                <div class="error-message" id="code-error"></div>
                            </div>
                            <div class="form-group">
                                <label for="password">密码</label>
                                <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary">注册</button>
                            <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">已有账号？去登录</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==================== 表单验证和错误提示 ====================
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId + '-error');
            const inputElement = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
            if (inputElement) {
                inputElement.classList.add('is-invalid');
            }
        }

        function clearError(elementId) {
            const errorDiv = document.getElementById(elementId + '-error');
            const inputElement = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.textContent = '';
                errorDiv.style.display = 'none';
            }
            if (inputElement) {
                inputElement.classList.remove('is-invalid');
            }
        }

        function showSuccess(elementId, message) {
            const successDiv = document.getElementById(elementId + '-success');
            if (successDiv) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        function clearSuccess(elementId) {
            const successDiv = document.getElementById(elementId + '-success');
            if (successDiv) {
                successDiv.textContent = '';
                successDiv.style.display = 'none';
            }
        }

        // 输入时清除错误
        document.getElementById('username').addEventListener('input', function() {
            clearError('username');
        });
        document.getElementById('email').addEventListener('input', function() {
            clearError('email');
        });
        document.getElementById('code').addEventListener('input', function() {
            clearError('code');
            clearSuccess('code');
        });

        // 按钮点击特效
        const buttons = document.querySelectorAll('.btn, .btn-send-code');
        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                // 创建点击波纹效果
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255, 255, 255, 0.3)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });

        @keyframes ripple {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        // ==================== 发送验证码 ====================
        document.getElementById('send-code').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const button = this;

            clearError('username');
            clearError('email');
            clearSuccess('code');

            if (!username) {
                showError('username', '请输入用户名');
                return;
            }
            if (!email) {
                showError('email', '请输入邮箱');
                return;
            }

            fetch('/send-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, username: username })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('服务器响应错误: ' + response.status);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    showSuccess('code', '验证码已发送，请查收邮件');
                    setTimeout(() => clearSuccess('code'), 3000);

                    button.disabled = true;
                    var countdown = 60;
                    button.textContent = countdown + '秒后重发';
                    var timer = setInterval(function() {
                        countdown--;
                        button.textContent = countdown + '秒后重发';
                        if (countdown <= 0) {
                            clearInterval(timer);
                            button.disabled = false;
                            button.textContent = '发送验证码';
                        }
                    }, 1000);
                } else {
                    var msg = data.message || '发送失败';
                    if (msg.includes('用户名已被使用')) {
                        showError('username', '该用户名已被注册，请更换其他用户名');
                    } else if (msg.includes('邮箱已被注册')) {
                        showError('email', '该邮箱已被注册，请直接登录或使用其他邮箱');
                    } else if (msg.includes('邮箱')) {
                        showError('email', '请输入正确的邮箱地址');
                    } else {
                        showError('email', msg);
                    }
                }
            })
            .catch(error => {
                console.error('请求错误:', error);
                showError('email', '网络请求失败，请检查网络连接或稍后重试');
            });
        });
    </script>
</body>
</html>
