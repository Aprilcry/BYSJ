<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智慧厨艺辅助系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 25%, #4facfe 50%, #00f2fe 75%, #43e97b 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 星星粒子效果 */
        .star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 1s ease-out forwards;
            box-shadow: 0 0 10px white, 0 0 20px white, 0 0 30px #ff00de, 0 0 40px #ff00de;
            z-index: 9999;
        }

        @keyframes twinkle {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(180deg);
            }
        }

        /* 背景漂浮元素 */
        .floating-element {
            position: fixed;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .floating-element:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-element:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 2s; }
        .floating-element:nth-child(4) { bottom: 10%; right: 10%; animation-delay: 3s; }
        .floating-element:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; }
        .floating-element:nth-child(6) { top: 50%; right: 5%; animation-delay: 5s; }

        /* 注册卡片 */
        .register-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 35px;
            width: 90%;
            max-width: 450px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
            animation: cardAppear 0.6s ease-out;
            margin: 20px 0;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 标题样式 */
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #fff, #ffe4e1, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-header .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 500;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-input:focus {
            border-color: #ff9a9e;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 154, 158, 0.4);
            transform: translateY(-2px);
        }

        .form-input.is-invalid {
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        /* 输入框组 */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group .form-input {
            flex: 1;
        }

        /* 发送验证码按钮 */
        .btn-send-code {
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 110px;
        }

        .btn-send-code:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }

        .btn-send-code:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 错误提示 */
        .error-message {
            color: #ff9a9e;
            font-size: 0.8rem;
            margin-top: 5px;
            padding-left: 5px;
            display: none;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .error-message::before {
            content: '✦ ';
        }

        .success-message {
            color: #43e97b;
            font-size: 0.8rem;
            margin-top: 5px;
            padding-left: 5px;
            display: none;
            font-weight: 500;
        }

        .success-message::before {
            content: '✨ ';
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.6);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            transform: translateY(-2px);
        }

        /* 装饰性元素 */
        .deco-circle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .deco-circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            animation: pulse 4s ease-in-out infinite;
        }

        .deco-circle-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .register-header h1 {
                font-size: 1.6rem;
            }

            .input-group {
                flex-direction: column;
            }

            .btn-send-code {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 漂浮装饰元素 -->
    <div class="floating-element">🌸</div>
    <div class="floating-element">⭐</div>
    <div class="floating-element">🎀</div>
    <div class="floating-element">✨</div>
    <div class="floating-element">🌙</div>
    <div class="floating-element">💫</div>

    <!-- 装饰圆圈 -->
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>

    <!-- 注册卡片 -->
    <div class="register-card">
        <div class="register-header">
            <h1>加入我们 ~</h1>
            <p class="subtitle">开启你的美食之旅</p>
        </div>

        <form method="POST" id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名" required>
                <div class="error-message" id="username-error"></div>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <div class="input-group">
                    <input type="email" class="form-input" id="email" name="email" placeholder="请输入邮箱" required>
                    <button type="button" class="btn-send-code" id="send-code">发送验证码</button>
                </div>
                <div class="error-message" id="email-error"></div>
            </div>
            <div class="form-group">
                <label for="code">验证码</label>
                <input type="text" class="form-input" id="code" name="code" placeholder="请输入验证码" required>
                <div class="success-message" id="code-success"></div>
                <div class="error-message" id="code-error"></div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
            <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">已有账号？去登录</a>
        </form>
    </div>

    <script>
        // ==================== 星星特效 ====================
        let lastStarTime = 0;
        const starInterval = 30;

        document.addEventListener('mousemove', function(e) {
            const currentTime = Date.now();
            if (currentTime - lastStarTime < starInterval) return;
            lastStarTime = currentTime;
            createStar(e.clientX, e.clientY);
        });

        document.addEventListener('touchmove', function(e) {
            const currentTime = Date.now();
            if (currentTime - lastStarTime < starInterval) return;
            lastStarTime = currentTime;
            const touch = e.touches[0];
            createStar(touch.clientX, touch.clientY);
        });

        function createStar(x, y) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 6 + 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            star.style.left = (x + offsetX) + 'px';
            star.style.top = (y + offsetY) + 'px';
            const colors = ['#ff9a9e', '#fecfef', '#a8edea', '#fed6e3', '#d299c2', '#fef9d7', '#43e97b', '#4facfe'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            star.style.boxShadow = `0 0 10px white, 0 0 20px ${color}, 0 0 30px ${color}`;
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 1000);
        }

        document.addEventListener('click', function(e) {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createStar(
                        e.clientX + (Math.random() - 0.5) * 50,
                        e.clientY + (Math.random() - 0.5) * 50
                    );
                }, i * 30);
            }
        });

        // ==================== 表单验证和错误提示 ====================
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId + '-error');
            const inputElement = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
            if (inputElement) {
                inputElement.classList.add('is-invalid');
            }
        }

        function clearError(elementId) {
            const errorDiv = document.getElementById(elementId + '-error');
            const inputElement = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.textContent = '';
                errorDiv.style.display = 'none';
            }
            if (inputElement) {
                inputElement.classList.remove('is-invalid');
            }
        }

        function showSuccess(elementId, message) {
            const successDiv = document.getElementById(elementId + '-success');
            if (successDiv) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        function clearSuccess(elementId) {
            const successDiv = document.getElementById(elementId + '-success');
            if (successDiv) {
                successDiv.textContent = '';
                successDiv.style.display = 'none';
            }
        }

        // 输入时清除错误
        document.getElementById('username').addEventListener('input', function() {
            clearError('username');
        });
        document.getElementById('email').addEventListener('input', function() {
            clearError('email');
        });
        document.getElementById('code').addEventListener('input', function() {
            clearError('code');
            clearSuccess('code');
        });

        // 输入框焦点特效
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                const rect = this.getBoundingClientRect();
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createStar(
                            rect.left + Math.random() * rect.width,
                            rect.top + Math.random() * rect.height
                        );
                    }, i * 50);
                }
            });
        });

        // ==================== 发送验证码 ====================
        document.getElementById('send-code').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const button = this;

            clearError('username');
            clearError('email');
            clearSuccess('code');

            if (!username) {
                showError('username', '请输入用户名');
                return;
            }
            if (!email) {
                showError('email', '请输入邮箱');
                return;
            }

            // 按钮点击特效
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const rect = button.getBoundingClientRect();
                    createStar(
                        rect.left + Math.random() * rect.width,
                        rect.top + Math.random() * rect.height
                    );
                }, i * 50);
            }

            fetch('/send-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, username: username })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('服务器响应错误: ' + response.status);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    showSuccess('code', '验证码已发送，请查收邮件');
                    setTimeout(() => clearSuccess('code'), 3000);

                    button.disabled = true;
                    var countdown = 60;
                    button.textContent = countdown + '秒后重发';
                    var timer = setInterval(function() {
                        countdown--;
                        button.textContent = countdown + '秒后重发';
                        if (countdown <= 0) {
                            clearInterval(timer);
                            button.disabled = false;
                            button.textContent = '发送验证码';
                        }
                    }, 1000);
                } else {
                    var msg = data.message || '发送失败';
                    if (msg.includes('用户名已被使用')) {
                        showError('username', '该用户名已被注册，请更换其他用户名');
                    } else if (msg.includes('邮箱已被注册')) {
                        showError('email', '该邮箱已被注册，请直接登录或使用其他邮箱');
                    } else if (msg.includes('邮箱')) {
                        showError('email', '请输入正确的邮箱地址');
                    } else {
                        showError('email', msg);
                    }
                }
            })
            .catch(error => {
                console.error('请求错误:', error);
                showError('email', '网络请求失败，请检查网络连接或稍后重试');
            });
        });
    </script>
</body>
</html>
