<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧厨艺辅助系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 星星粒子效果 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 1s ease-out forwards;
            box-shadow: 0 0 10px white, 0 0 20px white, 0 0 30px #ff00de, 0 0 40px #ff00de;
        }

        @keyframes twinkle {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(180deg);
            }
        }

        /* 背景漂浮元素 */
        .floating-element {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .floating-element:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-element:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 2s; }
        .floating-element:nth-child(4) { bottom: 10%; right: 10%; animation-delay: 3s; }
        .floating-element:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; }
        .floating-element:nth-child(6) { top: 50%; right: 5%; animation-delay: 5s; }

        /* 登录卡片 */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 标题样式 */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h1 {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #fff, #ffe4e1, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-input:focus {
            border-color: #ff9a9e;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 154, 158, 0.4);
            transform: translateY(-2px);
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            transform: translateY(-2px);
        }

        /* 错误提示 */
        .alert {
            background: rgba(255, 100, 100, 0.3);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            color: white;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .alert::before {
            content: '⚠️ ';
        }

        /* 装饰性元素 */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .deco-circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            animation: pulse 4s ease-in-out infinite;
        }

        .deco-circle-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
                margin: 20px;
            }
            
            .login-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 漂浮装饰元素 -->
    <div class="floating-element">🌸</div>
    <div class="floating-element">⭐</div>
    <div class="floating-element">🎀</div>
    <div class="floating-element">✨</div>
    <div class="floating-element">🌙</div>
    <div class="floating-element">💫</div>

    <!-- 装饰圆圈 -->
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <div class="login-header">
            <h1>欢迎回来 ~</h1>
            <p class="subtitle">开启你的美食之旅</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
            <a href="{{ url_for('auth.register') }}" class="btn btn-secondary">还没有账号？去注册</a>
        </form>
    </div>

    <script>
        // 鼠标滑动星星特效
        let lastStarTime = 0;
        const starInterval = 30; // 星星生成间隔（毫秒）

        document.addEventListener('mousemove', function(e) {
            const currentTime = Date.now();
            if (currentTime - lastStarTime < starInterval) return;
            lastStarTime = currentTime;

            createStar(e.clientX, e.clientY);
        });

        // 触摸设备支持
        document.addEventListener('touchmove', function(e) {
            const currentTime = Date.now();
            if (currentTime - lastStarTime < starInterval) return;
            lastStarTime = currentTime;

            const touch = e.touches[0];
            createStar(touch.clientX, touch.clientY);
        });

        function createStar(x, y) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // 随机大小
            const size = Math.random() * 6 + 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            // 随机偏移
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            star.style.left = (x + offsetX) + 'px';
            star.style.top = (y + offsetY) + 'px';
            
            // 随机颜色
            const colors = ['#ff9a9e', '#fecfef', '#a8edea', '#fed6e3', '#d299c2', '#fef9d7'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            star.style.boxShadow = `0 0 10px white, 0 0 20px ${color}, 0 0 30px ${color}`;
            
            document.body.appendChild(star);
            
            // 动画结束后移除
            setTimeout(() => {
                star.remove();
            }, 1000);
        }

        // 点击产生更多星星
        document.addEventListener('click', function(e) {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createStar(
                        e.clientX + (Math.random() - 0.5) * 50,
                        e.clientY + (Math.random() - 0.5) * 50
                    );
                }, i * 30);
            }
        });

        // 输入框焦点特效
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                // 产生星星环绕效果
                const rect = this.getBoundingClientRect();
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createStar(
                            rect.left + Math.random() * rect.width,
                            rect.top + Math.random() * rect.height
                        );
                    }, i * 50);
                }
            });
        });
    </script>
</body>
</html>
