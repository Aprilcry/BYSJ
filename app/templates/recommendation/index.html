{% extends 'base.html' %}

{% block title %}今日推荐 - 智慧厨艺辅助系统{% endblock %}

{% block content %}
    <div class="container py-8">
        <h1 class="text-center mb-8">今日推荐</h1>
        
        <!-- 排行榜标签 -->
        <div class="mb-8">
            <div class="d-flex justify-content-center">
                <button class="btn btn-primary me-4" onclick="showRanking('total')">总排行</button>
                <button class="btn btn-outline-primary me-4" onclick="showRanking('month')">月排行</button>
                <button class="btn btn-outline-primary" onclick="showRanking('day')">日排行</button>
            </div>
        </div>
        
        <!-- 展示台 -->
        <div class="mb-10">
            <div class="card rounded-lg overflow-hidden shadow-lg">
                <div class="card-body p-0">
                    <div class="row">
                        <div class="col-md-12">
                            <div id="recipe-carousel" class="carousel slide" data-bs-ride="carousel">
                                <div class="carousel-inner">
                                    <!-- 初始加载时显示占位内容 -->
                                    <div class="carousel-item active">
                                        <div class="d-block w-100" style="height: 450px; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center;">
                                            <div class="text-center">
                                                <h3>加载中...</h3>
                                                <p>正在获取排行榜数据</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button class="carousel-control-prev" type="button" data-bs-target="#recipe-carousel" data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Previous</span>
                                </button>
                                <button class="carousel-control-next" type="button" data-bs-target="#recipe-carousel" data-bs-slide="next">
                                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Next</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 个性化推荐 -->
        <div class="mb-10">
            <h2 class="text-center mb-10">为你推荐</h2>
            <div class="text-center mb-10">
                <button id="get-recommendations" class="btn btn-primary btn-lg">获取个性化匹配</button>
            </div>
            <div id="recommendation-results" class="row">
                <div class="col-md-12">
                    <div class="card shadow-lg">
                        <div class="card-body text-center p-8">
                            <h5 class="card-title mb-4">点击上方按钮获取个性化推荐</h5>
                            <p class="card-text text-muted mb-6">根据你添加的食材，我们会为你推荐最匹配的菜谱</p>
                            <a href="{{ url_for('ingredient.index') }}" class="btn btn-primary">去添加食材</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    {% block scripts %}
    <script>
        // 立即执行，测试函数是否正常
        console.log('JavaScript代码开始加载');
        
        function showRanking(type) {
            console.log('showRanking函数被调用，类型:', type);
            // 切换按钮样式
            try {
                document.querySelectorAll('.btn').forEach(btn => {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-primary');
                });
                event.target.classList.remove('btn-outline-primary');
                event.target.classList.add('btn-primary');
                
                // 切换排行榜的逻辑
                console.log('切换到' + type + '排行');
                
                // 这里可以添加AJAX请求来获取对应排行榜的数据
                // 然后更新轮播内容
                // 目前使用模拟数据
                updateCarousel(type);
            } catch (error) {
                console.error('showRanking函数错误:', error);
            }
        }
        
        function updateCarousel(type) {
            console.log('开始更新轮播，类型:', type);
            
            // 从API获取排行榜数据
            try {
                console.log('发送API请求:', `/recommendation/api/ranking?type=${type}`);
                fetch(`/recommendation/api/ranking?type=${type}`)
                    .then(response => {
                        console.log('API响应状态:', response.status);
                        console.log('API响应URL:', response.url);
                        console.log('API响应类型:', response.type);
                        return response.json();
                    })
                    .then(data => {
                        console.log('获取到的排行榜数据:', data);
                        
                        let recipes = data;
                        
                        // 如果数据不足5条，用总排行榜数据补充
                        if (recipes.length < 5) {
                            console.log('数据不足5条，开始补充');
                            fetch('/recommendation/api/ranking?type=total')
                                .then(response => response.json())
                                .then(totalData => {
                                    console.log('获取到的总排行榜数据:', totalData);
                                    for (let i = 0; i < totalData.length && recipes.length < 5; i++) {
                                        // 避免重复
                                        if (!recipes.some(r => r.title === totalData[i].title)) {
                                            recipes.push(totalData[i]);
                                            console.log('补充数据:', totalData[i].title);
                                        }
                                    }
                                    console.log('最终数据:', recipes);
                                    renderCarousel(recipes, type);
                                })
                                .catch(error => {
                                    console.error('获取总排行榜数据失败:', error);
                                    renderCarousel(recipes, type);
                                });
                        } else {
                            console.log('最终数据:', recipes);
                            renderCarousel(recipes, type);
                        }
                    })
                    .catch(error => {
                        console.error('获取排行榜数据失败:', error);
                        // 显示错误信息
                        const carouselInner = document.querySelector('#recipe-carousel .carousel-inner');
                        if (carouselInner) {
                            carouselInner.innerHTML = `
                                <div class="carousel-item active">
                                    <div class="d-block w-100" style="height: 400px; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center;">
                                        <div class="text-center">
                                            <h3>数据加载失败</h3>
                                            <p>请刷新页面重试</p>
                                            <p>错误信息: ${error.message}</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    });
            } catch (error) {
                console.error('updateCarousel函数错误:', error);
                const carouselInner = document.querySelector('#recipe-carousel .carousel-inner');
                if (carouselInner) {
                    carouselInner.innerHTML = `
                        <div class="carousel-item active">
                            <div class="d-block w-100" style="height: 400px; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center;">
                                <div class="text-center">
                                    <h3>JavaScript错误</h3>
                                    <p>${error.message}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        }
        
        function renderCarousel(recipes, type) {
            console.log('renderCarousel函数被调用，数据数量:', recipes.length);
            // 更新轮播内容
            try {
                const carouselInner = document.querySelector('#recipe-carousel .carousel-inner');
                console.log('找到carouselInner:', carouselInner);
                
                if (carouselInner) {
                    console.log('开始更新轮播内容');
                    carouselInner.innerHTML = '';
                    
                    recipes.forEach((recipe, index) => {
                        console.log('添加菜谱:', recipe.title, '索引:', index);
                        const item = document.createElement('div');
                        item.className = `carousel-item ${index === 0 ? 'active' : ''}`;
                        
                        // 根据排行榜类型显示不同的浏览量
                        let viewsText = '';
                        if (type === 'total') {
                            viewsText = `总浏览量: ${recipe.views}`;
                        } else if (type === 'month') {
                            viewsText = `月浏览量: ${recipe.month_views}`;
                        } else if (type === 'day') {
                            viewsText = `日浏览量: ${recipe.day_views}`;
                        }
                        
                        // 使用菜谱的真实图片URL，如果没有则生成
                        let imageUrl = recipe.image_url;
                        if (!imageUrl) {
                            const imagePrompt = encodeURIComponent(`${recipe.title} 美食图片`);
                            imageUrl = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${imagePrompt}&image_size=landscape_16_9`;
                        }
                        
                        item.innerHTML = `
                            <div class="d-block w-100" style="height: 400px; position: relative;">
                                <img src="${imageUrl}" class="d-block w-100 h-100 object-cover" alt="${recipe.title}">
                                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-4 rounded">
                                    <h3>${recipe.title}</h3>
                                    <p>${recipe.description}</p>
                                    <p>${viewsText}</p>
                                    <a href="${recipe.id ? '/recipe/detail/' + recipe.id : '#'}" class="btn btn-primary">查看详情</a>
                                </div>
                            </div>
                        `;
                        carouselInner.appendChild(item);
                    });
                    
                    console.log('轮播内容更新完成');
                    
                    // 检查轮播是否正常初始化
                    if (typeof bootstrap !== 'undefined') {
                        const carousel = new bootstrap.Carousel(document.getElementById('recipe-carousel'));
                        console.log('轮播初始化:', carousel);
                    } else {
                        console.warn('Bootstrap未加载');
                    }
                } else {
                    console.error('未找到carouselInner元素');
                }
            } catch (error) {
                console.error('renderCarousel函数错误:', error);
            }
        }
        
        // 页面加载时默认显示总排行
        console.log('页面加载中...');
        // 确保页面加载完成后更新轮播
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面DOM加载完成，开始更新轮播');
            try {
                updateCarousel('total');
            } catch (error) {
                console.error('DOMContentLoaded错误:', error);
            }
        });
        
        // 同时保留window.onload作为备份
        window.onload = function() {
            console.log('页面完全加载完成，确保轮播已更新');
            try {
                // 检查轮播是否已经有内容，如果没有则更新
                const carouselInner = document.querySelector('#recipe-carousel .carousel-inner');
                if (carouselInner && carouselInner.children.length === 1 && carouselInner.querySelector('.carousel-item.active .text-center')) {
                    updateCarousel('total');
                }
            } catch (error) {
                console.error('window.onload错误:', error);
            }
        };
        
        // 立即执行，测试函数是否正常
        console.log('JavaScript代码加载完成');
        console.log('测试updateCarousel函数:', typeof updateCarousel);
        console.log('测试renderCarousel函数:', typeof renderCarousel);
        console.log('测试showRanking函数:', typeof showRanking);
        console.log('测试bootstrap是否加载:', typeof bootstrap);
        
        // 个性化推荐功能
        document.getElementById('get-recommendations').addEventListener('click', function() {
            const button = this;
            const resultsContainer = document.getElementById('recommendation-results');
            
            // 显示加载状态
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在匹配...';
            
            // 发送请求获取推荐
            fetch('/recommendation/api/personalized')
                .then(response => response.json())
                .then(data => {
                    // 恢复按钮状态
                    button.disabled = false;
                    button.innerHTML = '获取个性化匹配';
                    
                    // 更新推荐结果
                    if (data.length > 0) {
                        let html = '';
                        data.forEach(recipe => {
                            let imageUrl = recipe.image_url;
                            if (!imageUrl) {
                                const imagePrompt = encodeURIComponent(`${recipe.title} 美食图片`);
                                imageUrl = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${imagePrompt}&image_size=landscape_16_9`;
                            }
                            
                            html += `
                                <div class="col-md-4 mb-4">
                                    <div class="card shadow-sm h-100">
                                        <div class="card-body">
                                            <img src="${imageUrl}" class="card-img-top mb-3 rounded" style="height: 200px; object-fit: cover;" alt="${recipe.title}">
                                            <h5 class="card-title">${recipe.title}</h5>
                                            <p class="card-text text-muted">${recipe.description.substring(0, 100)}${recipe.description.length > 100 ? '...' : ''}</p>
                                            <div class="mt-auto">
                                                <div class="d-flex justify-content-between align-items-center">
                                                    <span class="badge bg-primary">匹配度: ${recipe.match_count}</span>
                                                    <a href="/recipe/detail/${recipe.id}" class="btn btn-outline-primary btn-sm">查看详情</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        resultsContainer.innerHTML = html;
                    } else {
                        resultsContainer.innerHTML = `
                            <div class="col-md-12">
                                <div class="card shadow-sm">
                                    <div class="card-body text-center">
                                        <h5 class="card-title">暂无推荐</h5>
                                        <p class="card-text text-muted">请先添加食材到你的食材库</p>
                                        <a href="${url_for('ingredient.index')}" class="btn btn-primary">去添加食材</a>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('获取推荐失败:', error);
                    // 恢复按钮状态
                    button.disabled = false;
                    button.innerHTML = '获取个性化匹配';
                    
                    // 显示错误信息
                    resultsContainer.innerHTML = `
                        <div class="col-md-12">
                            <div class="card shadow-sm">
                                <div class="card-body text-center">
                                    <h5 class="card-title">获取推荐失败</h5>
                                    <p class="card-text text-muted">请稍后重试</p>
                                    <button class="btn btn-primary" onclick="location.reload()">刷新页面</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
        });
    </script>
    {% endblock %}
{% endblock %}

{% block styles %}
    <style>
        /* 全局样式 */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        /* 标题样式 */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 2rem;
        }
        
        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 2.5rem;
            position: relative;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 2px;
        }
        
        /* 按钮样式 */
        .btn {
            transition: all 0.3s ease;
            border-radius: 50px;
            font-weight: 600;
            padding: 10px 25px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            border: none;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.6);
        }
        
        .btn-outline-primary {
            border: 2px solid #3498db;
            color: #3498db;
        }
        
        .btn-outline-primary:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        
        /* 轮播样式 */
        .carousel {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .carousel-caption {
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 10px;
            bottom: 30px;
            left: 10%;
            right: 10%;
            backdrop-filter: blur(5px);
        }
        
        .carousel-caption h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .carousel-caption p {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .carousel-item {
            transition: transform 0.5s ease;
        }
        
        .carousel-item img {
            height: 400px;
            object-fit: cover;
        }
        
        /* 卡片样式 */
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }
        
        .card-body {
            padding: 25px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .card-text {
            color: #666;
            line-height: 1.6;
        }
        
        /* 推荐区域样式 */
        #recommendation-results {
            margin-top: 2rem;
        }
        
        #get-recommendations {
            font-size: 1.1rem;
            padding: 12px 35px;
            margin-bottom: 2rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .carousel-caption {
                padding: 15px;
                bottom: 20px;
            }
            
            .carousel-caption h3 {
                font-size: 1.2rem;
            }
        }
        
        /* 间距调整 */
        .py-8 {
            padding-top: 4rem !important;
            padding-bottom: 4rem !important;
        }
        
        .mb-6 {
            margin-bottom: 3rem !important;
        }
        
        .mb-8 {
            margin-bottom: 4rem !important;
        }
        
        .mb-10 {
            margin-bottom: 5rem !important;
        }
        
        .p-8 {
            padding: 4rem !important;
        }
        
        /* 加载状态 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
{% endblock %}
