{% extends 'base.html' %}

{% block title %}编辑食材 - 智慧厨艺辅助系统{% endblock %}

{% block content %}
    <h1 class="text-center mb-4">编辑食材</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">食材名称</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ ingredient.name }}" required>
        </div>
        <div class="mb-3">
            <label for="category" class="form-label">分类</label>
            <input type="text" class="form-control" id="category" name="category" value="{{ ingredient.category }}" required>
        </div>
        <div class="mb-3">
            <label for="added_at" class="form-label">时间</label>
            <input type="datetime-local" class="form-control" id="added_at" name="added_at" value="{{ user_ingredient.added_at.strftime('%Y-%m-%dT%H:%M') if user_ingredient and user_ingredient.added_at else '' }}">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('ingredient.index') }}" class="btn btn-secondary">取消</a>
    </form>
{% endblock %}
