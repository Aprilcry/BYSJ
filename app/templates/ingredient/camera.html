{% extends 'base.html' %}

{% block title %}摄像头识别 - 智慧厨艺辅助系统{% endblock %}

{% block content %}
    <h1 class="text-center mb-4">摄像头识别</h1>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- 摄像头显示区域 -->
                <div class="text-center mb-5">
                    <div id="video-container" style="width: 640px; height: 480px; border: 2px solid #000; margin: 0 auto; position: relative;">
                        <video id="video" width="640" height="480" autoplay></video>
                        <canvas id="canvas" width="640" height="480" style="position: absolute; top: 0; left: 0; z-index: 10;"></canvas>
                    </div>
                </div>
                
                <!-- 控制按钮 -->
                <div class="text-center">
                    <button id="start-btn" class="btn btn-success btn-lg">开始识别</button>
                    <button id="stop-btn" class="btn btn-danger btn-lg ml-4">停止识别</button>
                </div>
                
                <!-- 识别结果 -->
                <div class="mt-5">
                    <h3 class="text-center">识别结果</h3>
                    <div id="result" class="mt-3"></div>
                    <div class="text-center mt-3">
                        <button id="add-btn" class="btn btn-primary btn-lg" style="display: none;">添加到我的食材</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let startBtn = document.getElementById('start-btn');
        let stopBtn = document.getElementById('stop-btn');
        let addBtn = document.getElementById('add-btn');
        let resultDiv = document.getElementById('result');
        let stream = null;
        let recognitionInterval = null;
        let currentIngredient = null; // 存储最后一帧识别到的食材
        
        // 开始摄像头
        startBtn.addEventListener('click', async function() {
            try {
                console.log('开始尝试访问摄像头...');
                
                // 简化摄像头约束，提高兼容性
                const constraints = {
                    video: true
                };
                
                console.log('使用约束:', constraints);
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('成功获取摄像头流:', stream);
                
                video.srcObject = stream;
                console.log('视频流已设置到video元素');
                
                // 开始识别，设置识别频率为1秒一次
                recognitionInterval = setInterval(() => {
                    recognizeIngredient();
                }, 1000); // 每1秒识别一次
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                console.log('摄像头启动成功');
            } catch (error) {
                console.error('无法访问摄像头:', error);
                console.error('错误类型:', error.name);
                console.error('错误消息:', error.message);
                
                let errorMessage = '无法访问摄像头';
                if (error.name === 'NotAllowedError') {
                    errorMessage = '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头';
                } else if (error.name === 'NotFoundError') {
                    errorMessage = '未找到摄像头设备';
                } else if (error.name === 'NotReadableError') {
                    errorMessage = '摄像头被其他应用占用';
                } else if (error.name === 'OverconstrainedError') {
                    errorMessage = '摄像头参数设置错误';
                }
                
                alert(errorMessage);
            }
        });
        
        // 停止摄像头
        stopBtn.addEventListener('click', function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (recognitionInterval) {
                clearInterval(recognitionInterval);
            }
            
            // 自动添加最后一帧识别到的食材
            if (currentIngredient && currentIngredient !== 'null' && currentIngredient !== null && currentIngredient.trim() !== '') {
                console.log('添加食材:', currentIngredient);
                // 调用添加食材的接口
                fetch('/ingredient/add-from-camera', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        name: currentIngredient,
                        category: '其他',
                        quantity: '1'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log('添加响应:', data);
                    if (data.success) {
                        alert(`成功添加食材 ${currentIngredient} 到我的食材`);
                        // 跳转到食材管理页面
                        window.location.href = '{{ url_for('ingredient.index') }}';
                    } else {
                        alert(`添加失败: ${data.message}`);
                    }
                })
                .catch(error => {
                    console.error('添加请求错误:', error);
                    alert('添加失败: 网络错误');
                });
                
                // 清空当前识别到的食材
                currentIngredient = null;
            } else {
                console.log('currentIngredient为null或空，无法添加');
                alert('未检测到食材，无法添加');
            }
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            addBtn.style.display = 'none';
        });
        
        // 添加到我的食材
        addBtn.addEventListener('click', function() {
            if (currentIngredient) {
                // 调用添加食材的接口
                fetch('/ingredient/add-from-camera', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        name: currentIngredient,
                        category: '其他',
                        quantity: '1'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('食材添加成功');
                        addBtn.style.display = 'none';
                    } else {
                        alert('添加失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('添加请求错误:', error);
                    alert('添加失败: 网络错误');
                });
            }
        });
        
        // 识别食材
        function recognizeIngredient() {
            // 绘制视频帧到画布
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 将画布转换为Base64
            const imageData = canvas.toDataURL('image/jpeg');
            
            // 发送到服务器进行YOLO识别
            fetch('/ingredient/detect-ingredient', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ image: imageData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.result && data.result.name) {
                        const ingredient = data.result.name;
                        const confidence = data.result.confidence;
                        
                        // 存储当前识别到的食材
                        currentIngredient = ingredient;
                        
                        // 显示识别结果
                        resultDiv.innerHTML = `<div class="alert alert-success">识别到: ${ingredient} (置信度: ${(confidence * 100).toFixed(1)}%)</div>`;
                        
                        // 显示添加按钮
                        addBtn.style.display = 'inline-block';
                        
                        // 绘制边界框
                        drawBoundingBox(ingredient);
                    } else {
                        // 未检测到食材
                        resultDiv.innerHTML = `<div class="alert alert-info">未检测到食材</div>`;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        addBtn.style.display = 'none';
                        currentIngredient = null;
                    }
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">识别失败: ${data.message}</div>`;
                    addBtn.style.display = 'none';
                    currentIngredient = null;
                }
            })
            .catch(error => {
                console.error('识别请求错误:', error);
                resultDiv.innerHTML = `<div class="alert alert-danger">识别失败: 网络错误</div>`;
            });
        }
        
        // 绘制边界框
        function drawBoundingBox(ingredient) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 随机生成边界框位置
            const x = Math.random() * (canvas.width - 200);
            const y = Math.random() * (canvas.height - 200);
            const width = 200;
            const height = 200;
            
            // 绘制边界框
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
            
            // 绘制标签
            ctx.fillStyle = '#00ff00';
            ctx.font = '16px Arial';
            ctx.fillText(ingredient, x, y - 5);
        }
    </script>
{% endblock %}
